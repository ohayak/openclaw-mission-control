services:

  db:
    restart: "no"
    ports:
      - "5432:5432"

  backend:
    restart: "no"
    ports:
      - "8000:8000"
    build:
      context: .
      dockerfile: backend/Dockerfile
    command:
      - fastapi
      - run
      - --reload
      - "app/main.py"
    volumes:
      # Mount backend source for hot-reload
      - ./backend:/app/backend
      - /data/.openclaw:/data/.openclaw:ro
    environment:
      ENVIRONMENT: "local"
      OPENCLAW_CONFIG_PATH: "/data/.openclaw/openclaw.json"
      OPENCLAW_AGENTS_DIR: "/data/.openclaw/agents"
      PACT_PROJECTS_DIR: "/data/.openclaw/workspace"

  frontend:
    restart: "no"
    ports:
      - "5173:5173"
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000
        - NODE_ENV=development

networks:
  traefik-public:
    # For local dev, don't expect an external Traefik network
    external: false
